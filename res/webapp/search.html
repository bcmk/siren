<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport"
    content="width=device-width, initial-scale=1.0">
<title>{{.Header}}</title>
<script src="https://telegram.org/js/telegram-web-app.js">
</script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: -apple-system, BlinkMacSystemFont,
        'Segoe UI', Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #fff);
    color: var(--tg-theme-text-color, #000);
}
.header {
    padding: 16px 16px 0;
    font-size: 17px;
    font-weight: 600;
}
.search-box {
    padding: 12px;
    position: sticky;
    top: 0;
    background: var(--tg-theme-bg-color, #fff);
}
.search-box input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--tg-theme-hint-color, #ccc);
    border-radius: 8px;
    font-size: 16px;
    background: var(--tg-theme-secondary-bg-color, #f0f0f0);
    color: var(--tg-theme-text-color, #000);
    outline: none;
}
.search-box input::placeholder {
    color: var(--tg-theme-hint-color, #999);
}
.results {
    list-style: none;
}
.results li {
    padding: 12px 16px;
    border-bottom: 1px solid
        var(--tg-theme-secondary-bg-color, #eee);
    cursor: pointer;
    font-size: 15px;
}
.results li:active,
.results li.selected {
    background: var(--tg-theme-secondary-bg-color, #f0f0f0);
    color: var(--tg-theme-accent-text-color,
        var(--tg-theme-text-color, #000));
}
.hint {
    padding: 16px;
    text-align: center;
    color: var(--tg-theme-hint-color, #999);
    font-size: 14px;
}
.spinner {
    display: none;
    width: 20px;
    height: 20px;
    margin: 16px auto;
    border: 2px solid var(--tg-theme-hint-color, #ccc);
    border-top-color: var(--tg-theme-button-color, #999);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
}
@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<h1 class="header">{{.Header}}</h1>
<div class="search-box">
    <input type="text" id="q" placeholder="{{.Placeholder}}"
        maxlength="32" autocomplete="off" autocorrect="off"
        autocapitalize="off" spellcheck="false" autofocus>
</div>
<div class="spinner" id="spinner"></div>
<ul class="results" id="results"></ul>
<div class="hint" id="hint"></div>
<script>
var noResults = "{{.NoResults}}";
var searchFailed = "{{.Failed}}";
var failedToAdd = "{{.FailedToAdd}}";
var tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

var endpoint = new URLSearchParams(location.search).get("endpoint");
var input = document.getElementById("q");
var resultsList = document.getElementById("results");
var hint = document.getElementById("hint");
var spinner = document.getElementById("spinner");
var timer = null;
var selectedIdx = -1;

input.addEventListener("input", function() {
    clearTimeout(timer);
    selectedIdx = -1;
    var q = this.value.trim();
    if (q.length < 1) {
        spinner.style.display = "none";
        resultsList.innerHTML = "";
        hint.textContent = "";
        return;
    }
    spinner.style.display = "block";
    resultsList.innerHTML = "";
    hint.textContent = "";
    timer = setTimeout(function() { search(q); }, 300);
});

input.addEventListener("keydown", function(e) {
    var items = resultsList.children;
    if (items.length === 0) return;
    if (e.key === "ArrowDown") {
        e.preventDefault();
        if (selectedIdx < items.length - 1) selectedIdx++;
        updateSelection();
    } else if (e.key === "ArrowUp") {
        e.preventDefault();
        if (selectedIdx > -1) selectedIdx--;
        updateSelection();
    } else if (e.key === "Enter") {
        if (selectedIdx >= 0 && selectedIdx < items.length) {
            e.preventDefault();
            addStreamer(items[selectedIdx].textContent);
        }
    }
});

function updateSelection() {
    var items = resultsList.children;
    for (var i = 0; i < items.length; i++) {
        items[i].classList.toggle("selected", i === selectedIdx);
    }
    if (selectedIdx >= 0 && items[selectedIdx]) {
        items[selectedIdx].scrollIntoView({block: "nearest"});
    }
}

function search(q) {
    spinner.style.display = "block";
    resultsList.innerHTML = "";
    var url = "/apps/add/api/search?endpoint=" + encodeURIComponent(endpoint) +
        "&term=" + encodeURIComponent(q);
    fetch(url, {
        headers: {"X-Init-Data": tg.initData}
    })
    .then(function(r) { return r.json(); })
    .then(function(ids) {
        spinner.style.display = "none";
        resultsList.innerHTML = "";
        hint.textContent = "";
        selectedIdx = -1;
        if (ids.length === 0) {
            hint.textContent = noResults;
            return;
        }
        ids.forEach(function(id) {
            var li = document.createElement("li");
            li.textContent = id;
            li.addEventListener("click", function() {
                addStreamer(id);
            });
            resultsList.appendChild(li);
        });
    })
    .catch(function() {
        spinner.style.display = "none";
        hint.textContent = searchFailed;
    });
}

function addStreamer(id) {
    spinner.style.display = "block";
    hint.textContent = "";
    resultsList.innerHTML = "";
    input.disabled = true;
    var url = "/apps/add/api/submit?endpoint=" + encodeURIComponent(endpoint) +
        "&streamer=" + encodeURIComponent(id);
    fetch(url, {
        headers: {"X-Init-Data": tg.initData}
    })
    .then(function(r) {
        if (r.ok) {
            tg.close();
        } else {
            spinner.style.display = "none";
            input.disabled = false;
            hint.textContent = failedToAdd + " " + id;
        }
    })
    .catch(function() {
        spinner.style.display = "none";
        input.disabled = false;
        hint.textContent = failedToAdd + " " + id;
    });
}
</script>
</body>
</html>
